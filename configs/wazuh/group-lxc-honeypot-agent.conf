<!--
  Wazuh shared agent.conf for the lxc-honeypot group.
  Push to manager: pct push 122 ./group-lxc-honeypot-agent.conf \
                   /var/ossec/etc/shared/lxc-honeypot/agent.conf
                 + chown wazuh:wazuh + chmod 660
  Reload via: agents auto-pull via merged.mg périodiquement (~10 min)

  Why : si un attaquant arrive à pivoter sur LXC 120 honeypot via Cowrie,
  ils essaieront probablement de modifier la config Cowrie (désactiver
  honeypot, dump l'history des sessions précédentes, etc.). FIM realtime
  sur /home/cowrie/cowrie/etc/ détecte tout changement immédiat.
-->
<agent_config>

  <syscheck>
    <directories check_all="yes" realtime="yes" report_changes="yes">/home/cowrie/cowrie/etc</directories>
    <directories check_all="yes" realtime="yes">/home/cowrie/cowrie/userdb.txt</directories>
  </syscheck>

</agent_config>
