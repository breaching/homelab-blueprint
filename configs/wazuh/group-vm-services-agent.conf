<!--
  Wazuh shared agent.conf for the vm-services group (authentik VM + coolify VM).
  Push to manager: pct push 122 ./group-vm-services-agent.conf \
                   /var/ossec/etc/shared/vm-services/agent.conf
                 + chown wazuh:wazuh + chmod 660
  Reload via: agents auto-pull via merged.mg périodiquement (~10 min)

  Pourquoi : ces VMs run Docker (coolify a coolify+coolify-db+coolify-realtime+
  coolify-proxy+coolify-redis+coolify-sentinel+cloudflared-coolify+ + 2 containers
  utilisateur app1+app2 ; authentik a authentik+authentik-worker+postgres+redis).
  Le wodle docker_listener track:
  - Container start/stop/die/kill events
  - Image pulls + creates
  - Network connect/disconnect
  - Volume mounts

  Useful pour détecter :
  - Containers spawnés inopinément (compromise via webhook spoofing par ex)
  - Pulls d'images suspectes
  - Stop de containers critiques (DoS interne)
-->
<agent_config>

  <wodle name="docker-listener">
    <interval>10m</interval>
    <attempts>5</attempts>
    <run_on_start>yes</run_on_start>
    <disabled>no</disabled>
  </wodle>

</agent_config>
