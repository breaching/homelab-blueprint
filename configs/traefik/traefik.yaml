# === Traefik configuration ===
# LAN-only setup with LE DNS-01 Cloudflare wildcard cert

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# === Entrypoints ===
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare
        domains:
          - main: home.example.com
            sans:
              - "*.home.example.com"

  traefik:
    address: "127.0.0.1:8080"

# === Providers ===
providers:
  file:
    directory: /etc/traefik/conf.d/
    watch: true

# === Cert Resolver (Let's Encrypt DNS-01) ===
certificatesResolvers:
  cloudflare:
    acme:
      email: contact@home.example.com
      storage: /etc/traefik/ssl/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 30
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

# === API & Dashboard ===
api:
  dashboard: true
  insecure: false

# === Logging ===
log:
  filePath: /var/log/traefik/traefik.log
  format: json
  level: INFO

accessLog:
  filePath: /var/log/traefik/traefik-access.log
  format: json
  filters:
    statusCodes:
      - "200"
      - "400-599"
    retryAttempts: true
    minDuration: "10ms"
  bufferingSize: 0
  fields:
    headers:
      defaultMode: drop
      names:
        User-Agent: keep

# === ServersTransport pour backends HTTPS self-signed ===
serversTransports:
  insecure:
    insecureSkipVerify: true
